# ============================================================================
# GitLab Reverse Proxy Configuration
# ============================================================================
# 
# Proxy HTTPS traffic to GitLab container running at http://gitlab:80
# 
# Domains:
#   - gitlab.cmnw.xyz (primary domain)
#   - git.cmnw.xyz (alias domain)
# 
# Features:
#   - SSL/TLS termination with cmnw.xyz wildcard certificate
#   - WebSocket support for GitLab CI/CD logs and real-time features
#   - Large file uploads support (512MB for Git push operations)
#   - Connection timeouts optimized for GitLab operations (300s)
# ============================================================================

# Upstream GitLab backend configuration
upstream gitlab_upstream {
  server gitlab:80;
  keepalive 32;
}

# HTTP Server - Redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name gitlab.cmnw.xyz git.cmnw.xyz gitlab.cmnw.ru git.cmnw.ru;

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS Server - gitlab.cmnw.xyz
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name gitlab.cmnw.xyz;

  # SSL Certificate Configuration
  ssl_certificate     /etc/nginx/.certs/cmnw.xyz.pem;
  ssl_certificate_key /etc/nginx/.certs/cmnw.xyz.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:TLS:10m;

  # Security Headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # GitLab-specific settings
  client_max_body_size 512m;  # Support large Git pushes
  proxy_buffering off;         # Disable buffering for real-time features

  # Timeouts for GitLab operations
  proxy_connect_timeout 300;
  proxy_send_timeout 300;
  proxy_read_timeout 300;
  send_timeout 300;

  # Support for Let's Encrypt and ACME challenges
  location /.well-known/ {
    proxy_pass http://gitlab_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on;
  }

  # Main GitLab location
  location / {
    proxy_pass http://gitlab_upstream;
    proxy_http_version 1.1;
    
    # Standard proxy headers
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on;
    
    # WebSocket support for GitLab CI/CD logs and real-time features
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Additional headers for GitLab
    proxy_cache_bypass $http_upgrade;
  }
}

# HTTPS Server - git.cmnw.xyz (alias)
