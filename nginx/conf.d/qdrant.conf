# ============================================================================
# Qdrant Vector Database Reverse Proxy Configuration
# ============================================================================
# 
# Proxy HTTPS traffic to Qdrant container running at http://qdrant:6333 (REST)
# and grpc://qdrant:6334 (gRPC)
# 
# Domain:
#   - qdrant.cmnw.xyz
# 
# Features:
#   - SSL/TLS termination with cmnw.xyz wildcard certificate
#   - REST API access via default location (/)
#   - gRPC API access via /grpc location
#   - Large file uploads support (100MB for vector uploads)
#   - Timeouts optimized for vector operations (60s)
# ============================================================================

# Upstream Qdrant REST API backend configuration
upstream qdrant_http {
  server qdrant:6333;
  keepalive 32;
}

# Upstream Qdrant gRPC API backend configuration
upstream qdrant_grpc {
  server qdrant:6334;
}

# HTTP Server - Redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name qdrant.cmnw.xyz;

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS Server - qdrant.cmnw.xyz
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name qdrant.cmnw.xyz;

  # SSL Certificate Configuration
  ssl_certificate     /etc/nginx/ssl/cmnw.xyz.crt;
  ssl_certificate_key /etc/nginx/ssl/cmnw.xyz.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:TLS:10m;

  # Security Headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Qdrant-specific settings
  client_max_body_size 100m;  # Support large vector uploads

  # Timeouts for vector operations
  proxy_connect_timeout 60;
  proxy_send_timeout 60;
  proxy_read_timeout 60;
  send_timeout 60;

  # gRPC API location
  location /grpc {
    grpc_pass grpc://qdrant_grpc;
    
    # gRPC headers
    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    grpc_set_header X-Forwarded-Proto $scheme;
    
    # Error handling for gRPC
    error_page 502 = /error502grpc;
  }

  # Error page for gRPC
  location = /error502grpc {
    internal;
    default_type application/grpc;
    add_header grpc-status 14;
    add_header grpc-message "unavailable";
    return 204;
  }

  # Main REST API location
  location / {
    proxy_pass http://qdrant_http;
    proxy_http_version 1.1;
    
    # Standard proxy headers
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on;
  }
}
