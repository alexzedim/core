name: 'gitlab'

services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    ports:
      - "8083:80"
      - "8443:443"
      - "2222:22"
    shm_size: 2g
    volumes:
      - git_config:/etc/gitlab
      - git_data:/var/opt/gitlab
      - git_data:/var/log/gitlab
    environment:
      # Default root password (change after first login)
      GITLAB_ROOT_PASSWORD: admin123
      # GitLab Omnibus Configuration
      # Configure external URL, nginx settings, and proxy headers
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.cmnw.xyz'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['proxy_set_headers'] = {
          "X-Forwarded-Proto" => "https",
          "X-Forwarded-Ssl" => "on"
        }
    networks:
      - cmnw

networks:
  cmnw:
    external: true

volumes:
  git_config:
    name: gitlab_config
  git_data:
    name: git_data